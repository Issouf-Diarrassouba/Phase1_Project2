# config/spark-defaults.conf
# Applied to all spark-submit jobs in this project via SPARK_CONF_DIR.

spark.master                           spark://spark-master:7077
spark.sql.session.timeZone             UTC

# Kafka/Redpanda connector, required for the Structured Streaming source
spark.jars.packages                    org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1

# Resource sizing for local dev cluster
spark.executor.memory                  2g
spark.executor.cores                   2
spark.driver.memory                    1g

# Structured Streaming stability/perf tuning
spark.sql.streaming.schemaInference    false
spark.sql.shuffle.partitions           8
spark.streaming.stopGracefullyOnShutdown true

# Parquet output
spark.sql.parquet.compression.codec    snappy

# Local dev event logging (for Spark History Server, optional)
spark.eventLog.enabled                 true
spark.eventLog.dir                     /opt/spark/storage/spark-events