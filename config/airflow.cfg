# config/airflow.cfg
# Minimal local-dev override file. Full defaults are generated by the
# Airflow image on first boot; these are the values this project cares
# about overriding for the Docker Compose dev setup. Values here are
# also mirrored as AIRFLOW__SECTION__KEY env vars in docker-compose.yml,
# which take precedence -- this file is kept for reference and for any
# tooling that reads airflow.cfg directly instead of the environment.

[core]
dags_folder = /opt/airflow/dags
executor = LocalExecutor
load_examples = False
default_timezone = utc

[database]
sql_alchemy_conn = postgresql+psycopg2://airflow:airflow@postgres/airflow

[webserver]
web_server_port = 8080
expose_config = False

[scheduler]
dag_dir_list_interval = 30
catchup_by_default = False

[logging]
base_log_folder = /opt/airflow/logs
logging_level = INFO