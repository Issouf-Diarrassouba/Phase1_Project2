volumes:
  postgres-db-volume:

services:

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  spark:
    image: apache/spark:4.0.3
    container_name: spark
    depends_on:
      - redpanda
    volumes:
      - ./jobs:/jobs
      - ./storage:/storage
    working_dir: /jobs
    command: tail -f /dev/null

  producer:
    image: python:3.11
    container_name: producer
    depends_on:
      - redpanda
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "
      pip install -r requirements.txt &&
      python jobs/producers/mock_iot_producer.py
      "

  consumer:
    image: apache/spark:4.0.3
    container_name: consumer
    depends_on:
      - redpanda
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:9092
      - HOME=/tmp
      - PYTHONPATH=/app
    working_dir: /app
    volumes:
      - ./:/app
      - ./storage:/storage
    command: >
      /opt/spark/bin/spark-submit
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.0.3
      jobs/consumers/spark_iot_consumer.py

  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  airflow-init:
    build:
      context: ./docker/airflow
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./storage:/opt/airflow/storage
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    build:
      context: ./docker/airflow
    container_name: airflow-webserver
    depends_on:
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./storage:/opt/airflow/storage
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build:
      context: ./docker/airflow
    container_name: airflow-scheduler
    depends_on:
      - airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./storage:/opt/airflow/storage
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler